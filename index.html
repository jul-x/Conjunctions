<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Verb Matcher</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            --verb-color: #00d2ff;
            --phrase-color: #ff0076;
            --success: #00ff88;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        #game-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: stretch;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            width: 42%;
        }

        .item {
            padding: 15px 12px;
            background: var(--glass);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            font-size: 15px;
            font-weight: 600;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 55px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .item.selected {
            background: white;
            color: black;
            transform: scale(1.1) translateX(5px);
            box-shadow: 0 0 20px var(--verb-color);
        }

        .item.matched {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
            border-color: var(--success);
            pointer-events: none;
            transform: scale(0.95);
        }

        .dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 10px white;
        }
        .verb .dot { right: -25px; }
        .phrase .dot { left: -25px; }

        #win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 40px;
            border-radius: 30px;
            display: none;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .btn-restart {
            margin-top: 20px;
            padding: 15px 35px;
            background: linear-gradient(90deg, #00ff88, #00d2ff);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; text-transform: uppercase; letter-spacing: 3px;">Verb Connect</h2>
</header>

<div id="game-container">
    <canvas id="canvas"></canvas>
    <div class="column" id="verbs-col"></div>
    <div class="column" id="phrases-col"></div>
</div>

<div id="win-message">
    <h1 style="margin: 0 0 10px; font-size: 2.5rem;">BOOM! ⚡</h1>
    <p style="font-size: 1.2rem;">You are a Grammar Pro!</p>
    <button class="btn-restart" onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
    // Обновленные пары согласно вашему списку
    const pairs = [
        { v: "invite", p: "somebody to dinner" },
        { v: "meet", p: "in a coffee bar" },
        { v: "take", p: "somebody to a restaurant" },
        { v: "knock", p: "on the door" },
        { v: "play", p: "a song" },
        { v: "run", p: "across the road" },
        { v: "be", p: "in a hurry" },
        { v: "wait", p: "for somebody" },
        { v: "try", p: "to stop" }
    ];

    const verbsList = ["invite", "meet", "take", "knock", "play", "run", "be", "wait", "try"];
    // Фразы перемешаны для сложности
    const phrasesList = ["for somebody", "to stop", "in a hurry", "across the road", "a song", "on the door", "somebody to a restaurant", "in a coffee bar", "somebody to dinner"];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let selectedVerb = null;
    let completedMatches = [];

    function init() {
        const vCol = document.getElementById('verbs-col');
        const pCol = document.getElementById('phrases-col');

        verbsList.forEach(v => {
            const div = document.createElement('div');
            div.className = 'item verb';
            div.innerHTML = `${v} <div class="dot"></div>`;
            div.onclick = () => selectVerb(div, v);
            vCol.appendChild(div);
        });

        phrasesList.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item phrase';
            div.innerHTML = `<div class="dot"></div> ${p}`;
            div.onclick = () => selectPhrase(div, p);
            pCol.appendChild(div);
        });

        resize();
        window.addEventListener('resize', resize);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drawLines();
    }

    function selectVerb(element, val) {
        if (element.classList.contains('matched')) return;
        document.querySelectorAll('.verb').forEach(i => i.classList.remove('selected'));
        element.classList.add('selected');
        selectedVerb = { element, val };
    }

    function selectPhrase(element, val) {
        if (!selectedVerb || element.classList.contains('matched')) return;

        const isCorrect = pairs.find(p => p.v === selectedVerb.val && p.p === val);

        if (isCorrect) {
            element.classList.add('matched');
            selectedVerb.element.classList.add('matched');
            completedMatches.push({ from: selectedVerb.element, to: element });
            drawLines();
            checkWin();
        } else {
            element.style.boxShadow = '0 0 30px #ff0000';
            setTimeout(() => element.style.boxShadow = '', 400);
        }

        selectedVerb.element.classList.remove('selected');
        selectedVerb = null;
    }

    function drawLines() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        
        completedMatches.forEach(match => {
            const fromRect = match.from.querySelector('.dot').getBoundingClientRect();
            const toRect = match.to.querySelector('.dot').getBoundingClientRect();

            ctx.beginPath();
            ctx.strokeStyle = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff88';
            ctx.moveTo(fromRect.left + 5, fromRect.top + 5);
            ctx.lineTo(toRect.left + 5, toRect.top + 5);
            ctx.stroke();
            ctx.shadowBlur = 0;
        });
    }

    function checkWin() {
        if (completedMatches.length === pairs.length) {
            setTimeout(() => {
                document.getElementById('win-message').style.display = 'block';
            }, 500);
        }
    }

    init();
</script>

</body>
</html>
