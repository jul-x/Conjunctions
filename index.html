<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verb Match Game</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent-color: #ff9a9e;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--primary-gradient);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        #game-area {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            margin-top: 10px;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 45%;
            height: 80vh; /* Ограничиваем высоту для удобства на мобильных */
        }

        .item {
            background: var(--card-bg);
            color: #333;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            user-select: none;
        }

        .item.selected {
            background: var(--accent-color);
            color: white;
            transform: scale(1.03);
        }

        .item.matched {
            opacity: 0.4;
            background: #d1d1d1;
            color: #777;
            pointer-events: none;
            box-shadow: none;
        }

        .controls {
            padding: 20px 0;
        }

        .btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-area">
        <div class="column" id="verbs-col"></div>
        <div class="column" id="phrases-col"></div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="location.reload()">RESET GAME</button>
    </div>
</div>

<script>
    const pairs = [
        { v: "invite", p: "somebody to dinner" },
        { v: "meet", p: "in a coffee bar" },
        { v: "take", p: "somebody to a restaurant" },
        { v: "knock", p: "on the door" },
        { v: "play", p: "a song" },
        { v: "run", p: "across the road" },
        { v: "be", p: "in a hurry" },
        { v: "wait", p: "for somebody" },
        { v: "try", p: "to stop" }
    ];

    // Списки слов (фразы перемешаны вручную)
    const verbs = ["invite", "meet", "take", "knock", "play", "run", "be", "wait", "try"];
    const phrases = ["for somebody", "to stop", "in a hurry", "across the road", "a song", "on the door", "somebody to a restaurant", "in a coffee bar", "somebody to dinner"];

    let selected = null;

    function init() {
        const vCol = document.getElementById('verbs-col');
        const pCol = document.getElementById('phrases-col');

        verbs.forEach(v => {
            const el = document.createElement('div');
            el.className = 'item verb';
            el.textContent = v;
            el.onclick = () => {
                document.querySelectorAll('.verb').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
                selected = { el, val: v };
            };
            vCol.appendChild(el);
        });

        phrases.forEach(p => {
            const el = document.createElement('div');
            el.className = 'item phrase';
            el.textContent = p;
            el.onclick = () => {
                if (!selected) return;
                
                // Проверка правильности
                if (pairs.find(pair => pair.v === selected.val && pair.p === p)) {
                    el.classList.add('matched');
                    selected.el.classList.add('matched');
                } else {
                    // Визуальный фидбек при ошибке
                    el.style.background = '#ffbaba';
                    setTimeout(() => el.style.background = '', 400);
                }
                
                selected.el.classList.remove('selected');
                selected = null;
            };
            pCol.appendChild(el);
        });
    }

    init();
</script>

</body>
</html>
