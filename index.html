<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connectors Challenge</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-shadow: 0 20px 50px rgba(0,0,0,0.3);
            --accent: #00d2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .game-wrapper {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        /* Контейнер карточки */
        .card-scene {
            perspective: 1200px;
            margin-bottom: 40px;
        }

        .card {
            width: 100%;
            height: 320px;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* Стороны карточки */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Рубашка */
        .card-front {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .card-front .icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .card-front span {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            opacity: 0.7;
        }

        /* Лицевая сторона */
        .card-back {
            background: white;
            color: #1a1a1a;
            transform: rotateY(180deg);
        }

        .sentence {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.5;
        }

        .sentence b {
            color: #ff4b2b; /* Выделение союзов цветом */
            text-decoration: underline;
        }

        /* Кнопка */
        .main-btn {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,210,255,0.3);
        }

        .main-btn:active {
            transform: scale(0.95);
        }

        .progress {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.6;
        }

        /* Эффект при смене */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-animation { animation: pop 0.4s ease-out; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="card-scene">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="icon">✨</div>
                <span>Tap to reveal</span>
            </div>
            <div class="card-face card-back">
                <div class="sentence" id="display">Are you ready?</div>
            </div>
        </div>
    </div>

    <button class="main-btn" onclick="nextCard()">NEXT CARD</button>
    <div class="progress" id="progress">Cards left: ...</div>
</div>

<script>
    // Предложения из вашего списка с выделением союзов тегом <b>
    const rawSentences = [
        "I was really tired <b>so</b> ...",
        "I didn't phone you <b>because</b> ...",
        "It was quite a good film <b>but</b> ...",
        "<b>Although</b> my job isn't very well paid ...",
        "My father is French and my mother is Spanish <b>so</b> ...",
        "He was driving fast <b>because</b> ...",
        "I wanted to buy some bread <b>but</b> ...",
        "<b>Although</b> my boss is very friendly ...",
        "She wasn't feeling well <b>so</b> ...",
        "I couldn't come to class last week <b>because</b> ...",
        "She likes him a lot <b>but</b> ...",
        "We really like that restaurant <b>although</b> ...",
        "I wanted to improve my English <b>so</b> ...",
        "I woke up in the middle of the night <b>because</b> ...",
        "We took our umbrella <b>but</b> ...",
        "<b>Although</b> we played very well ...",
        "The weather was very cold <b>so</b> ...",
        "We couldn't understand the man <b>because</b> ...",
        "They're poor <b>but</b> ...",
        "<b>Although</b> it was a five-star hotel ..."
    ];

    let deck = [];
    const card = document.getElementById('card');
    const display = document.getElementById('display');
    const progress = document.getElementById('progress');

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        deck = shuffle([...rawSentences]);
        updateProgress();
        showFront();
    }

    function flipCard() {
        card.classList.toggle('is-flipped');
    }

    function showFront() {
        card.classList.remove('is-flipped');
    }

    function updateProgress() {
        progress.innerText = `Cards remaining: ${deck.length}`;
    }

    function nextCard() {
        if (deck.length === 0) {
            alert("Perfect! You've finished all cards.");
            initGame();
            return;
        }

        // Если карта была открыта, закрываем её перед сменой текста
        if (card.classList.contains('is-flipped')) {
            card.classList.remove('is-flipped');
            setTimeout(draw, 300);
        } else {
            draw();
        }
    }

    function draw() {
        const text = deck.pop();
        display.innerHTML = text; // Используем innerHTML для поддержки тегов <b>
        updateProgress();
        
        // Анимация появления
        const scene = document.querySelector('.card-scene');
        scene.classList.remove('pop-animation');
        void scene.offsetWidth; 
        scene.classList.add('pop-animation');
    }

    initGame();
</script>

</body>
</html>
