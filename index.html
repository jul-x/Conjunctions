<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Cards</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --accent-color: #ff9a9e;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--primary-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
        }

        #game-area {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            height: 450px;
            position: relative;
            margin-bottom: 20px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 42%;
            z-index: 10;
        }

        .item {
            background: var(--card-bg);
            color: #333;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .item.selected {
            background: var(--accent-color);
            color: white;
            transform: scale(1.05);
        }

        .item.matched {
            opacity: 0.6;
            background: #e0e0e0;
            color: #888;
            pointer-events: none;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #764ba2;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .verb .dot { right: -15px; }
        .phrase .dot { left: -15px; }

        .btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #win-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-area">
        <canvas id="canvas"></canvas>
        <div class="column" id="verbs-col"></div>
        <div class="column" id="phrases-col"></div>
    </div>
    <button class="btn" onclick="location.reload()">Reset Game</button>
</div>

<div id="win-msg">
    <h2>Excellent! 🌟</h2>
    <p>All pairs are matched.</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>

<script>
    const pairs = [
        { v: "invite", p: "somebody to dinner" },
        { v: "meet", p: "in a coffee bar" },
        { v: "take", p: "somebody to a restaurant" },
        { v: "knock", p: "on the door" },
        { v: "play", p: "a song" },
        { v: "run", p: "across the road" },
        { v: "be", p: "in a hurry" },
        { v: "wait", p: "for somebody" },
        { v: "try", p: "to stop" }
    ];

    const verbs = ["invite", "meet", "take", "knock", "play", "run", "be", "wait", "try"];
    const phrases = ["for somebody", "to stop", "in a hurry", "across the road", "a song", "on the door", "somebody to a restaurant", "in a coffee bar", "somebody to dinner"];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let selected = null;
    let matches = [];

    function init() {
        const vCol = document.getElementById('verbs-col');
        const pCol = document.getElementById('phrases-col');

        verbs.forEach(v => {
            const el = document.createElement('div');
            el.className = 'item verb';
            el.innerHTML = `${v}<div class="dot"></div>`;
            el.onclick = () => {
                document.querySelectorAll('.verb').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
                selected = { el, val: v };
            };
            vCol.appendChild(el);
        });

        phrases.forEach(p => {
            const el = document.createElement('div');
            el.className = 'item phrase';
            el.innerHTML = `<div class="dot"></div>${p}`;
            el.onclick = () => {
                if (!selected) return;
                if (pairs.find(pair => pair.v === selected.val && pair.p === p)) {
                    el.classList.add('matched');
                    selected.el.classList.add('matched');
                    matches.push({ from: selected.el, to: el });
                    draw();
                    if (matches.length === pairs.length) document.getElementById('win-msg').style.display = 'block';
                } else {
                    el.style.background = '#ff9a9e';
                    setTimeout(() => el.style.background = '', 400);
                }
                selected.el.classList.remove('selected');
                selected = null;
            };
            pCol.appendChild(el);
        });

        window.addEventListener('resize', draw);
        setTimeout(draw, 100);
    }

    function draw() {
        canvas.width = document.getElementById('game-area').offsetWidth;
        canvas.height = document.getElementById('game-area').offsetHeight;
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 3;
        matches.forEach(m => {
            const f = m.from.querySelector('.dot').getBoundingClientRect();
            const t = m.to.querySelector('.dot').getBoundingClientRect();
            const c = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(f.left - c.left + 4, f.top - c.top + 4);
            ctx.lineTo(t.left - c.left + 4, t.top - c.top + 4);
            ctx.stroke();
        });
    }

    init();
</script>

</body>
</html>
