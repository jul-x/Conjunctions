<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verb Matcher</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--primary-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        header {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.1);
        }

        #game-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: stretch;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            width: 42%;
        }

        .item {
            padding: 12px 10px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            user-select: none;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        .item.selected {
            background: white;
            color: #764ba2;
            transform: scale(1.05);
        }

        .item.matched {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
            border-color: var(--success);
            pointer-events: none;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .verb .dot { right: -20px; }
        .phrase .dot { left: -20px; }

        #win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            display: none;
            z-index: 100;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">Match Verbs & Phrases</h2>
</header>

<div id="game-container">
    <canvas id="canvas"></canvas>
    <div class="column" id="verbs-col"></div>
    <div class="column" id="phrases-col"></div>
</div>

<div id="win-message">
    <h2>Well Done! 🌟</h2>
    <p>You matched all pairs correctly.</p>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>

<script>
    const pairs = [
        { v: "invite", p: "somebody to dinner" },
        { v: "meet", p: "in a coffee bar" },
        { v: "take", p: "somebody to a restaurant" },
        { v: "knock", p: "on the door" },
        { v: "play", p: "a song" },
        { v: "run", p: "across the road" },
        { v: "be", p: "in a hurry" },
        { v: "wait", p: "for somebody" },
        { v: "try", p: "to stop" }
    ];

    const verbsList = ["invite", "meet", "take", "knock", "play", "run", "be", "wait", "try"];
    const phrasesList = ["for somebody", "to stop", "in a hurry", "across the road", "a song", "on the door", "somebody to a restaurant", "in a coffee bar", "somebody to dinner"];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let selectedVerb = null;
    let completedMatches = [];

    function init() {
        const vCol = document.getElementById('verbs-col');
        const pCol = document.getElementById('phrases-col');

        verbsList.forEach(v => {
            const div = document.createElement('div');
            div.className = 'item verb';
            div.innerHTML = `${v} <div class="dot"></div>`;
            div.onclick = () => selectVerb(div, v);
            vCol.appendChild(div);
        });

        phrasesList.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item phrase';
            div.innerHTML = `<div class="dot"></div> ${p}`;
            div.onclick = () => selectPhrase(div, p);
            pCol.appendChild(div);
        });

        resize();
        window.addEventListener('resize', resize);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drawLines();
    }

    function selectVerb(element, val) {
        if (element.classList.contains('matched')) return;
        document.querySelectorAll('.verb').forEach(i => i.classList.remove('selected'));
        element.classList.add('selected');
        selectedVerb = { element, val };
    }

    function selectPhrase(element, val) {
        if (!selectedVerb || element.classList.contains('matched')) return;

        const isCorrect = pairs.find(p => p.v === selectedVerb.val && p.p === val);

        if (isCorrect) {
            element.classList.add('matched');
            selectedVerb.element.classList.add('matched');
            completedMatches.push({ from: selectedVerb.element, to: element });
            drawLines();
            checkWin();
        } else {
            element.style.borderColor = 'red';
            setTimeout(() => element.style.borderColor = '', 400);
        }

        selectedVerb.element.classList.remove('selected');
        selectedVerb = null;
    }

    function drawLines() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 3;
        
        completedMatches.forEach(match => {
            const fromRect = match.from.querySelector('.dot').getBoundingClientRect();
            const toRect = match.to.querySelector('.dot').getBoundingClientRect();

            ctx.beginPath();
            ctx.strokeStyle = '#00ff88';
            ctx.moveTo(fromRect.left + 4, fromRect.top + 4);
            ctx.lineTo(toRect.left + 4, toRect.top + 4);
            ctx.stroke();
        });
    }

    function checkWin() {
        if (completedMatches.length === pairs.length) {
            setTimeout(() => {
                document.getElementById('win-message').style.display = 'block';
            }, 500);
        }
    }

    init();
</script>

</body>
</html>
